name: Secret Scan
on:
  pull_request:
  push:
    branches: [main, dev]
permissions:
  contents: read

jobs:
  scan:
    name: secret-scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # extra_args must not repeat flags the action already injects (--no-update, --fail, --github-actions).
      # Pin version so ghcr.io image matches this action ref (default "latest" can change CLI behavior).
      - uses: trufflesecurity/trufflehog@v3.94.3
        with:
          version: "3.90.2"
          extra_args: --results=verified,unknown
