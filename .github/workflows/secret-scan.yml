name: Secret Scan
on:
  pull_request:
  push:
    branches: [main, dev]
permissions:
  contents: read

jobs:
  scan:
    name: secret-scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@v3.90.2
        with:
          extra_args: --no-update --results=verified,unknown
